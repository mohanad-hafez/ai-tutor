<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#080e1a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121a2a"/>
      <stop offset="1" stop-color="#0e1626"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#94a3b8" fill-opacity="0.04"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>

  <!-- Header -->
  <text x="80" y="64" font-size="14" font-weight="600" letter-spacing="3" fill="#00e5a0">TRACTION · 2-WEEK BUILD</text>
  <text x="80" y="116" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="-0.4">It's already real</text>
  <text x="80" y="148" font-size="16" fill="#94a3b8">Not a slide deck — a working product. Every claim below is measured, not promised.</text>

  <!-- Big checklist · 2 columns -->

  <!-- LEFT column · y=200 -->
  <g filter="url(#shadow)">
    <rect x="80" y="200" width="880" height="700" rx="14" fill="url(#card)" stroke="#1e293b" stroke-width="1.2"/>
    <rect x="80" y="200" width="880" height="3" fill="#00e5a0"/>
    <text x="120" y="240" font-size="13" font-weight="700" letter-spacing="2.4" fill="#00e5a0">SHIPPED · WORKS TODAY</text>

    <!-- Item 1 -->
    <g transform="translate(120, 280)">
      <circle cx="14" cy="14" r="14" fill="#00e5a0" fill-opacity="0.18" stroke="#00e5a0" stroke-width="1.8"/>
      <path d="M 7 14 L 12 19 L 21 9" stroke="#00e5a0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="50" y="12" font-size="18" font-weight="700" fill="#ffffff">5-agent pipeline closed</text>
      <text x="50" y="36" font-size="13" fill="#94a3b8">Retriever · Planner · Memory · Author · Verifier — JSON over forced tool-use</text>
    </g>

    <!-- Item 2 -->
    <g transform="translate(120, 360)">
      <circle cx="14" cy="14" r="14" fill="#00e5a0" fill-opacity="0.18" stroke="#00e5a0" stroke-width="1.8"/>
      <path d="M 7 14 L 12 19 L 21 9" stroke="#00e5a0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="50" y="12" font-size="18" font-weight="700" fill="#ffffff">Verifier loop in production</text>
      <text x="50" y="36" font-size="13" fill="#94a3b8">live iframe → postMessage runtime errors → Author regen → srcdoc swap</text>
    </g>

    <!-- Item 3 -->
    <g transform="translate(120, 440)">
      <circle cx="14" cy="14" r="14" fill="#00e5a0" fill-opacity="0.18" stroke="#00e5a0" stroke-width="1.8"/>
      <path d="M 7 14 L 12 19 L 21 9" stroke="#00e5a0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="50" y="12" font-size="18" font-weight="700" fill="#ffffff">Manim pipeline shipping mp4</text>
      <text x="50" y="36" font-size="13" fill="#94a3b8">warm Python worker · &lt; 60s per render · self-repair on render error</text>
    </g>

    <!-- Item 4 -->
    <g transform="translate(120, 520)">
      <circle cx="14" cy="14" r="14" fill="#00e5a0" fill-opacity="0.18" stroke="#00e5a0" stroke-width="1.8"/>
      <path d="M 7 14 L 12 19 L 21 9" stroke="#00e5a0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="50" y="12" font-size="18" font-weight="700" fill="#ffffff">Skill induction loop running</text>
      <text x="50" y="36" font-size="13" fill="#94a3b8">Extractor · Sweeper · Merger · headless puppeteer execution oracle</text>
    </g>

    <!-- Item 5 -->
    <g transform="translate(120, 600)">
      <circle cx="14" cy="14" r="14" fill="#00e5a0" fill-opacity="0.18" stroke="#00e5a0" stroke-width="1.8"/>
      <path d="M 7 14 L 12 19 L 21 9" stroke="#00e5a0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="50" y="12" font-size="18" font-weight="700" fill="#ffffff">Knowledge graph navigation</text>
      <text x="50" y="36" font-size="13" fill="#94a3b8">ReactFlow canvas · highlight-to-spawn child nodes · zoom-out structure</text>
    </g>

    <!-- Item 6 -->
    <g transform="translate(120, 680)">
      <circle cx="14" cy="14" r="14" fill="#00e5a0" fill-opacity="0.18" stroke="#00e5a0" stroke-width="1.8"/>
      <path d="M 7 14 L 12 19 L 21 9" stroke="#00e5a0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="50" y="12" font-size="18" font-weight="700" fill="#ffffff">Hash + semantic cache layered</text>
      <text x="50" y="36" font-size="13" fill="#94a3b8">cosine match on plan embedding · ~50ms cache hits skip Author entirely</text>
    </g>

    <!-- Item 7 -->
    <g transform="translate(120, 760)">
      <circle cx="14" cy="14" r="14" fill="#00e5a0" fill-opacity="0.18" stroke="#00e5a0" stroke-width="1.8"/>
      <path d="M 7 14 L 12 19 L 21 9" stroke="#00e5a0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="50" y="12" font-size="18" font-weight="700" fill="#ffffff">Live agent trace UI</text>
      <text x="50" y="36" font-size="13" fill="#94a3b8">SSE stream of every agent step · visible during generation</text>
    </g>
  </g>

  <!-- RIGHT column · big numbers -->
  <g filter="url(#shadow)">
    <rect x="980" y="200" width="860" height="700" rx="14" fill="url(#card)" stroke="#00e5a0" stroke-width="1.8"/>
    <rect x="980" y="200" width="860" height="3" fill="#00e5a0"/>
    <text x="1020" y="240" font-size="13" font-weight="700" letter-spacing="2.4" fill="#00e5a0">MEASURED · 2 WEEKS · INTERNAL DEV + TESTING</text>

    <!-- Number 1: 25 generations -->
    <g transform="translate(1020, 274)">
      <text x="0" y="80" font-size="100" font-weight="700" fill="#ffffff" letter-spacing="-2">25</text>
      <text x="220" y="44" font-size="18" font-weight="700" letter-spacing="2" fill="#cbd5e1">REAL GENERATIONS</text>
      <text x="220" y="68" font-size="14" fill="#94a3b8">across 2 weeks of internal dev + testing</text>
      <text x="220" y="86" font-size="14" fill="#94a3b8">no synthetic data, no extrapolation</text>
    </g>

    <line x1="1020" y1="380" x2="1820" y2="380" stroke="#1e293b"/>

    <!-- Number 2: 9.8% -->
    <g transform="translate(1020, 396)">
      <text x="0" y="80" font-size="100" font-weight="700" fill="#00e5a0" letter-spacing="-2">9.8%</text>
      <text x="280" y="44" font-size="18" font-weight="700" letter-spacing="2" fill="#cbd5e1">COST REDUCTION</text>
      <text x="280" y="68" font-size="14" fill="#94a3b8">average output-token reduction across 25 gens</text>
      <text x="280" y="86" font-size="14" fill="#94a3b8">19.5% best · 14%+ top quartile</text>
    </g>

    <line x1="1020" y1="502" x2="1820" y2="502" stroke="#1e293b"/>

    <!-- Number 3: 7 skills -->
    <g transform="translate(1020, 518)">
      <text x="0" y="80" font-size="100" font-weight="700" fill="#ffffff" letter-spacing="-2">7</text>
      <text x="180" y="44" font-size="18" font-weight="700" letter-spacing="2" fill="#cbd5e1">SKILLS AUTO-PROMOTED</text>
      <text x="180" y="68" font-size="14" fill="#94a3b8">no manual curation · zero human selection</text>
      <text x="180" y="86" font-size="14" fill="#94a3b8">Sweeper proposed · Merger headless-tested · merged</text>
    </g>

    <line x1="1020" y1="624" x2="1820" y2="624" stroke="#1e293b"/>

    <!-- Number 4: <60s -->
    <g transform="translate(1020, 640)">
      <text x="0" y="80" font-size="80" font-weight="700" fill="#ffffff" letter-spacing="-2">&lt; 60s</text>
      <text x="220" y="44" font-size="18" font-weight="700" letter-spacing="2" fill="#cbd5e1">MANIM RENDER LATENCY</text>
      <text x="220" y="68" font-size="14" fill="#94a3b8">warm worker · 480p · most concepts under 30s</text>
      <text x="220" y="86" font-size="14" fill="#94a3b8">first-time spin-up &lt; 90s</text>
    </g>

    <line x1="1020" y1="746" x2="1820" y2="746" stroke="#1e293b"/>

    <!-- Tag: Public repo -->
    <g transform="translate(1020, 770)">
      <text x="0" y="20" font-size="13" font-weight="700" letter-spacing="2.4" fill="#00e5a0">CODE PUBLIC</text>
      <text x="0" y="46" font-size="14" font-family="JetBrains Mono, ui-monospace, monospace" fill="#cbd5e1">github.com/mohanad-hafez/ai-tutor</text>
      <text x="0" y="68" font-size="12" font-style="italic" fill="#94a3b8">repo open · all of the above is auditable</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(80, 940)">
    <rect x="0" y="0" width="1760" height="80" rx="12" fill="#121a2a" stroke="#00e5a0" stroke-width="1.4" stroke-opacity="0.6"/>
    <text x="30" y="34" font-size="14" font-weight="700" letter-spacing="2.4" fill="#00e5a0">THE PROOF</text>
    <text x="30" y="64" font-size="17" fill="#cbd5e1">
      <tspan font-style="italic">2 weeks. 7 systems shipped. 25 real generations.</tspan>
      <tspan dx="14" font-weight="700" fill="#00e5a0">Working product, not a hand-wave.</tspan>
    </text>
  </g>
</svg>
