<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 660" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a10"/>
      <stop offset="1" stop-color="#070710"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10101a"/>
      <stop offset="1" stop-color="#0a0a13"/>
    </linearGradient>
    <linearGradient id="cache-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#064e3b" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#064e3b" stop-opacity="0.15"/>
    </linearGradient>
    <pattern id="grid3" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#a1a1aa"/>
    </pattern>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arr3-cache" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#34d399"/>
    </marker>
    <marker id="arr3-err" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#fb7185"/>
    </marker>
    <marker id="arr3-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="1240" height="660" fill="url(#bg3)"/>
  <rect width="1240" height="660" fill="url(#grid3)" opacity="0.04"/>

  <!-- Header -->
  <text x="60" y="50" font-size="13" font-weight="500" letter-spacing="3" fill="#6366f1">FIGURE 3</text>
  <text x="60" y="88" font-size="32" font-weight="700" fill="#f5f5f7" letter-spacing="-0.5">Video pipeline · state machine</text>
  <text x="60" y="114" font-size="15" font-weight="400" fill="#a1a1aa">Manim renders run as a background job. Stage transitions stream over SSE with a live ETA. Cache short-circuits</text>
  <text x="60" y="132" font-size="15" font-weight="400" fill="#a1a1aa">on identical requests. Render failures trigger one self-repair pass before erroring out.</text>

  <!--
    LAYOUT PLAN (viewBox 1240 × 660):
    Main row y=290, card height=80  → mid y=330, bottom y=370
    repair card above rendering: y=170, height=74  → bottom y=244
    "cache hit" card: same y=290 as main row, placed at x=1060 (rightmost, in row)

    Main row x positions (gap=22 between cards):
      queued:     x=60,   w=130  → right=190
      planning:   x=212,  w=130  → right=342
      generating: x=364,  w=150  → right=514
      rendering:  x=536,  w=200  → right=736  (centre x=636)
      done:       x=758,  w=140  → right=898  (centre x=828)
      error:      x=920,  w=140  → right=1060 (centre x=990)
      cache hit:  x=1082, w=138  → right=1220 (centre x=1151)

    repair card above rendering: x=536, w=200 → centre x=636
  -->

  <!-- repair card — above rendering card -->
  <g transform="translate(536, 170)">
    <rect width="200" height="74" rx="12" fill="url(#card3)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4 4"/>
    <rect width="200" height="3" rx="1.5" fill="#fbbf24"/>
    <text x="100" y="32" font-size="13" font-weight="700" fill="#f5f5f7" text-anchor="middle">repair</text>
    <text x="100" y="50" font-size="10" letter-spacing="1.5" fill="#fbbf24" text-anchor="middle">CONDITIONAL</text>
    <text x="100" y="64" font-size="10" fill="#a1a1aa" text-anchor="middle">stderr → regen script · 1× retry</text>
  </g>

  <!-- ═══════════════ MAIN STAGE ROW (y=290) ═══════════════ -->

  <!-- queued -->
  <g transform="translate(60, 290)">
    <rect width="130" height="80" rx="12" fill="url(#card3)" stroke="#52525b" stroke-width="1"/>
    <rect width="130" height="3" rx="1.5" fill="#a1a1aa"/>
    <text x="65" y="34" font-size="13" font-weight="700" fill="#f5f5f7" text-anchor="middle">queued</text>
    <text x="65" y="56" font-size="10" letter-spacing="1.5" fill="#71717a" text-anchor="middle">0%</text>
    <text x="65" y="70" font-size="10" fill="#a1a1aa" text-anchor="middle">job created</text>
  </g>

  <!-- planning -->
  <g transform="translate(212, 290)">
    <rect width="130" height="80" rx="12" fill="url(#card3)" stroke="#818cf8" stroke-width="1"/>
    <rect width="130" height="3" rx="1.5" fill="#818cf8"/>
    <text x="65" y="34" font-size="13" font-weight="700" fill="#f5f5f7" text-anchor="middle">planning</text>
    <text x="65" y="56" font-size="10" letter-spacing="1.5" fill="#818cf8" text-anchor="middle">5%</text>
    <text x="65" y="70" font-size="10" fill="#a1a1aa" text-anchor="middle">emit_manim · sonnet</text>
  </g>

  <!-- generating -->
  <g transform="translate(364, 290)">
    <rect width="150" height="80" rx="12" fill="url(#card3)" stroke="#34d399" stroke-width="1"/>
    <rect width="150" height="3" rx="1.5" fill="#34d399"/>
    <text x="75" y="34" font-size="13" font-weight="700" fill="#f5f5f7" text-anchor="middle">generating</text>
    <text x="75" y="56" font-size="10" letter-spacing="1.5" fill="#34d399" text-anchor="middle">25%</text>
    <text x="75" y="70" font-size="10" fill="#a1a1aa" text-anchor="middle">Regex sandboxCheck</text>
  </g>

  <!-- rendering (wider, aligned with repair card above) -->
  <g transform="translate(536, 290)">
    <rect width="200" height="80" rx="12" fill="url(#card3)" stroke="#a78bfa" stroke-width="1"/>
    <rect width="200" height="3" rx="1.5" fill="#a78bfa"/>
    <text x="100" y="34" font-size="13" font-weight="700" fill="#f5f5f7" text-anchor="middle">rendering</text>
    <text x="100" y="56" font-size="10" letter-spacing="1.5" fill="#a78bfa" text-anchor="middle">40%</text>
    <text x="100" y="70" font-size="10" fill="#a1a1aa" text-anchor="middle">manim_worker.py · ETA streams every 2 s</text>
  </g>

  <!-- done -->
  <g transform="translate(758, 290)">
    <rect width="140" height="80" rx="12" fill="url(#card3)" stroke="#34d399" stroke-width="1.5"/>
    <rect width="140" height="3" rx="1.5" fill="#34d399"/>
    <text x="70" y="34" font-size="13" font-weight="700" fill="#bbf7d0" text-anchor="middle">done</text>
    <text x="70" y="56" font-size="10" letter-spacing="1.5" fill="#34d399" text-anchor="middle">100%</text>
    <text x="70" y="70" font-size="10" fill="#a1a1aa" text-anchor="middle">mp4 + chapters</text>
  </g>

  <!-- error -->
  <g transform="translate(920, 290)">
    <rect width="140" height="80" rx="12" fill="url(#card3)" stroke="#fb7185" stroke-width="1.5"/>
    <rect width="140" height="3" rx="1.5" fill="#fb7185"/>
    <text x="70" y="34" font-size="13" font-weight="700" fill="#fecdd3" text-anchor="middle">error</text>
    <text x="70" y="56" font-size="10" letter-spacing="1.5" fill="#fb7185" text-anchor="middle">100%</text>
    <text x="70" y="70" font-size="10" fill="#a1a1aa" text-anchor="middle">terminal · SSE closes</text>
  </g>

  <!-- cache hit — IN the main row, rightmost -->
  <g transform="translate(1082, 290)">
    <rect width="138" height="80" rx="12" fill="url(#cache-glow)" stroke="#34d399" stroke-width="1.5"/>
    <rect width="138" height="3" rx="1.5" fill="#34d399"/>
    <text x="69" y="30" font-size="13" font-weight="700" fill="#bbf7d0" text-anchor="middle">cache hit</text>
    <text x="69" y="46" font-size="10" letter-spacing="1.5" fill="#34d399" text-anchor="middle">SHORTCUT</text>
    <text x="69" y="60" font-size="10" fill="#a1a1aa" text-anchor="middle">SHA256 keyed</text>
    <text x="69" y="74" font-size="10" fill="#a1a1aa" text-anchor="middle">~30 ms vs ~30 s</text>
  </g>

  <!-- ═══════════════ FORWARD ARROWS (mid y=330) ═══════════════ -->
  <g stroke="#a78bfa" stroke-width="2" fill="none">
    <!-- queued → planning -->
    <line x1="190" y1="330" x2="212" y2="330" marker-end="url(#arr3)"/>
    <!-- planning → generating -->
    <line x1="342" y1="330" x2="364" y2="330" marker-end="url(#arr3)"/>
    <!-- generating → rendering -->
    <line x1="514" y1="330" x2="536" y2="330" marker-end="url(#arr3)"/>
    <!-- rendering → done -->
    <line x1="736" y1="330" x2="758" y2="330" marker-end="url(#arr3)"/>
  </g>

  <!-- ═══════════════ REPAIR LOOP ARROWS ═══════════════ -->
  <!-- rendering → repair (up: rendering top=290, repair bottom=244) -->
  <g stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-dasharray="4 4">
    <path d="M 606 290 C 606 268, 606 248, 606 244" marker-end="url(#arr3-loop)"/>
  </g>
  <text x="618" y="272" font-size="10" fill="#fbbf24" font-style="italic">render exit ≠ 0</text>

  <!-- repair → rendering (back down) -->
  <g stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-dasharray="4 4">
    <path d="M 666 244 C 666 262, 666 276, 666 290" marker-end="url(#arr3-loop)"/>
  </g>
  <text x="678" y="272" font-size="10" fill="#fbbf24">retry once</text>

  <!-- ═══════════════ ERROR ARROWS ═══════════════ -->
  <!-- generating → error (sandbox reject, arc below cards) -->
  <g stroke="#fb7185" stroke-width="1.5" fill="none" stroke-dasharray="4 4">
    <path d="M 439 370 C 439 430, 990 430, 990 370" marker-end="url(#arr3-err)"/>
  </g>
  <text x="715" y="448" text-anchor="middle" font-size="11" fill="#fb7185" font-style="italic">sandbox reject · forbidden import or pattern</text>

  <!-- rendering → error (cancelled, arc deeper below) -->
  <g stroke="#fb7185" stroke-width="1.5" fill="none" stroke-dasharray="4 4">
    <path d="M 636 370 C 636 476, 990 476, 990 370" marker-end="url(#arr3-err)"/>
  </g>
  <text x="813" y="494" text-anchor="middle" font-size="11" fill="#fb7185" font-style="italic">cancel · DELETE /api/video/:id (SIGTERM)</text>

  <!-- repair → error (failed twice, arc above repair card) -->
  <g stroke="#fb7185" stroke-width="1.5" fill="none" stroke-dasharray="4 4">
    <path d="M 736 207 C 836 207, 990 240, 990 290" marker-end="url(#arr3-err)"/>
  </g>
  <text x="892" y="224" font-size="10" fill="#fb7185" text-anchor="middle">failed twice</text>

  <!-- ═══════════════ CACHE HIT ARROW ═══════════════ -->
  <!-- queued → cache hit: arc ABOVE the repair card (peak y=148) -->
  <g stroke="#34d399" stroke-width="1.5" fill="none" stroke-dasharray="4 4">
    <path d="M 125 290 C 125 148, 1151 148, 1151 290" marker-end="url(#arr3-cache)"/>
  </g>
  <text x="638" y="140" text-anchor="middle" font-size="11" fill="#34d399" font-style="italic">if cached: copy mp4, emit done immediately</text>

  <!-- ═══════════════ SSE EVENTS PANEL ═══════════════ -->
  <g transform="translate(60, 520)">
    <text x="0" y="0" font-size="13" font-weight="600" letter-spacing="2" fill="#a1a1aa">SSE EVENTS</text>
    <line x1="0" y1="14" x2="120" y2="14" stroke="#27272a"/>
  </g>

  <g transform="translate(60, 554)">
    <rect x="-4" y="-14" width="58" height="22" rx="11" fill="#1e293b"/>
    <text x="25" y="0" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle">stage</text>
    <text x="68" y="2" font-size="12" fill="#a1a1aa">on every state change AND every 2 s during rendering (carries live etaSec)</text>
  </g>

  <g transform="translate(60, 586)">
    <rect x="-4" y="-14" width="48" height="22" rx="11" fill="#064e3b"/>
    <text x="20" y="0" font-size="11" font-weight="700" fill="#86efac" text-anchor="middle">done</text>
    <text x="58" y="2" font-size="12" fill="#a1a1aa">terminal · {videoUrl, durationSec, chapters, title, summary}</text>
  </g>

  <g transform="translate(60, 618)">
    <rect x="-4" y="-14" width="50" height="22" rx="11" fill="#4c0519"/>
    <text x="21" y="0" font-size="11" font-weight="700" fill="#fecdd3" text-anchor="middle">error</text>
    <text x="60" y="2" font-size="12" fill="#a1a1aa">terminal · {message} · last 2000 chars of stderr</text>
  </g>
</svg>
