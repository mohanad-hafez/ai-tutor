<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121a2a"/>
      <stop offset="1" stop-color="#0e1626"/>
    </linearGradient>
    <linearGradient id="cyl-side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0e1626"/>
      <stop offset="0.5" stop-color="#1a2740"/>
      <stop offset="1" stop-color="#0e1626"/>
    </linearGradient>
    <radialGradient id="cluster-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00e5a0" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#00e5a0" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#00e5a0"/>
    </marker>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#00e5a0" fill-opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="#0b1220"/>
  <rect width="1920" height="1080" fill="url(#dots)" opacity="0.04"/>

  <!-- Header -->
  <text x="100" y="92" font-size="22" font-weight="600" letter-spacing="5" fill="#00e5a0">VIT · LIBRARY GROWS ITSELF</text>
  <text x="100" y="170" font-size="60" font-weight="700" fill="#e6f7ee" letter-spacing="-1">How the library grows itself</text>
  <text x="100" y="208" font-size="20" fill="#7a93b0">three agents · three stores · zig-zag of writes and reads</text>

  <!-- ════════ Agent row labels (over the cards) ════════ -->
  <g font-size="12" font-weight="600" letter-spacing="3" fill="#7a93b0">
    <text x="100" y="278">AGENTS</text>
  </g>

  <!-- ════════ Agent 1 — Extractor (top-left) ════════ -->
  <g transform="translate(190, 300)">
    <rect width="280" height="220" rx="18" fill="url(#card)" stroke="#00e5a0" stroke-opacity="0.5"/>
    <rect width="280" height="6" rx="3" fill="#00e5a0"/>
    <circle cx="44" cy="56" r="22" fill="#0b1220" stroke="#00e5a0" stroke-width="2.5"/>
    <text x="44" y="65" font-size="22" font-weight="700" fill="#00e5a0" text-anchor="middle">1</text>
    <text x="80" y="65" font-size="30" font-weight="700" fill="#e6f7ee">Extractor</text>
    <text x="30" y="106" font-size="13" font-weight="600" letter-spacing="2.5" fill="#7a93b0">PER LESSON</text>

    <!-- mini glyph: code with 2 highlights -->
    <g transform="translate(30, 124)">
      <rect width="220" height="56" rx="6" fill="#0a1322" stroke="#00e5a0" stroke-opacity="0.3"/>
      <rect x="10" y="10" width="120" height="5" rx="2" fill="#3a4458"/>
      <rect x="10" y="22" width="200" height="8" rx="3" fill="#00e5a0" fill-opacity="0.7"/>
      <rect x="10" y="36" width="160" height="5" rx="2" fill="#3a4458"/>
      <rect x="10" y="46" width="180" height="6" rx="2" fill="#00e5a0" fill-opacity="0.55"/>
    </g>

    <text x="140" y="206" font-size="14" font-family="ui-monospace, monospace" fill="#00e5a0" text-anchor="middle">claude-haiku-4-5</text>
  </g>

  <!-- ════════ Agent 3 — Sweeper (top-mid) ════════ -->
  <g transform="translate(820, 300)">
    <rect width="280" height="220" rx="18" fill="url(#card)" stroke="#00e5a0" stroke-opacity="0.5"/>
    <rect width="280" height="6" rx="3" fill="#00e5a0"/>
    <circle cx="44" cy="56" r="22" fill="#0b1220" stroke="#00e5a0" stroke-width="2.5"/>
    <text x="44" y="65" font-size="22" font-weight="700" fill="#00e5a0" text-anchor="middle">3</text>
    <text x="80" y="65" font-size="30" font-weight="700" fill="#e6f7ee">Sweeper</text>
    <text x="30" y="106" font-size="13" font-weight="600" letter-spacing="2.5" fill="#7a93b0">PERIODIC · COUNT ≥ 3</text>

    <!-- mini glyph: cluster → fn -->
    <g transform="translate(30, 124)">
      <rect width="220" height="56" rx="6" fill="#0a1322" stroke="#00e5a0" stroke-opacity="0.3"/>
      <g fill="#00e5a0">
        <circle cx="22" cy="20" r="3"/><circle cx="32" cy="16" r="3"/>
        <circle cx="28" cy="28" r="3"/><circle cx="40" cy="24" r="3"/>
        <circle cx="22" cy="38" r="3"/><circle cx="36" cy="38" r="3"/>
      </g>
      <line x1="60" y1="28" x2="100" y2="28" stroke="#00e5a0" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="160" y="33" font-size="13" font-family="ui-monospace, monospace" fill="#00e5a0" font-weight="700" text-anchor="middle">function fn(){...}</text>
    </g>

    <text x="140" y="206" font-size="14" font-family="ui-monospace, monospace" fill="#00e5a0" text-anchor="middle">claude-sonnet-4-6</text>
  </g>

  <!-- ════════ Agent 5 — Merger (top-right) ════════ -->
  <g transform="translate(1450, 300)">
    <rect width="280" height="220" rx="18" fill="url(#card)" stroke="#00e5a0" stroke-opacity="0.5"/>
    <rect width="280" height="6" rx="3" fill="#00e5a0"/>
    <circle cx="44" cy="56" r="22" fill="#0b1220" stroke="#00e5a0" stroke-width="2.5"/>
    <text x="44" y="65" font-size="22" font-weight="700" fill="#00e5a0" text-anchor="middle">5</text>
    <text x="80" y="65" font-size="30" font-weight="700" fill="#e6f7ee">Merger</text>
    <text x="30" y="106" font-size="13" font-weight="600" letter-spacing="2.5" fill="#7a93b0">EXECUTION ORACLE</text>

    <!-- mini glyph: browser + check -->
    <g transform="translate(30, 124)">
      <rect width="220" height="56" rx="6" fill="#0a1322" stroke="#00e5a0" stroke-opacity="0.3"/>
      <rect width="220" height="14" rx="6" fill="#162338"/>
      <rect y="8" width="220" height="6" fill="#162338"/>
      <circle cx="12" cy="7" r="3" fill="#fb7185"/>
      <circle cx="24" cy="7" r="3" fill="#fbbf24"/>
      <circle cx="36" cy="7" r="3" fill="#34d399"/>
      <circle cx="60" cy="38" r="14" fill="#00e5a0" fill-opacity="0.18" stroke="#00e5a0" stroke-width="2"/>
      <path d="M 53 38 L 58 43 L 68 32" fill="none" stroke="#00e5a0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="155" y="42" font-size="13" font-family="ui-monospace, monospace" fill="#cfdcec" text-anchor="middle">0 errors · clean run</text>
    </g>

    <text x="140" y="206" font-size="14" font-family="ui-monospace, monospace" fill="#00e5a0" text-anchor="middle">puppeteer + sonnet</text>
  </g>

  <!-- ════════ Store row label ════════ -->
  <text x="100" y="986" font-size="12" font-weight="600" letter-spacing="3" fill="#7a93b0">STORES</text>

  <!-- ════════ Store 2 — Vector DB (cylinder, bottom-left) ════════ -->
  <g>
    <!-- step label below cylinder -->
    <circle cx="234" cy="990" r="22" fill="#0b1220" stroke="#00e5a0" stroke-width="2.5"/>
    <text x="234" y="999" font-size="22" font-weight="700" fill="#00e5a0" text-anchor="middle">2</text>
    <text x="270" y="999" font-size="30" font-weight="700" fill="#e6f7ee">Vector DB</text>

    <!-- cylinder body -->
    <rect x="210" y="660" width="240" height="280" fill="url(#cyl-side)" stroke="#00e5a0" stroke-opacity="0.55"/>
    <line x1="210" y1="660" x2="210" y2="940" stroke="#00e5a0" stroke-width="2"/>
    <line x1="450" y1="660" x2="450" y2="940" stroke="#00e5a0" stroke-width="2"/>
    <ellipse cx="330" cy="940" rx="120" ry="22" fill="#0e1626" stroke="#00e5a0" stroke-width="2"/>
    <ellipse cx="330" cy="660" rx="120" ry="22" fill="#16223a" stroke="#00e5a0" stroke-width="2"/>

    <!-- clusters inside -->
    <g>
      <ellipse cx="270" cy="730" rx="40" ry="28" fill="url(#cluster-glow)"/>
      <g fill="#00e5a0">
        <circle cx="258" cy="722" r="3.5"/><circle cx="272" cy="716" r="3.5"/>
        <circle cx="284" cy="724" r="3.5"/><circle cx="266" cy="734" r="3.5"/>
        <circle cx="280" cy="736" r="3.5"/>
      </g>
      <g transform="translate(298, 712)">
        <rect width="32" height="20" rx="10" fill="#0b1220" stroke="#00e5a0"/>
        <text x="16" y="14" font-size="11" font-family="ui-monospace, monospace" fill="#00e5a0" text-anchor="middle" font-weight="700">×8</text>
      </g>
    </g>
    <g>
      <ellipse cx="390" cy="715" rx="30" ry="22" fill="url(#cluster-glow)"/>
      <g fill="#00e5a0">
        <circle cx="384" cy="708" r="3.5"/><circle cx="396" cy="714" r="3.5"/>
        <circle cx="388" cy="722" r="3.5"/>
      </g>
      <g transform="translate(404, 698)">
        <rect width="32" height="20" rx="10" fill="#0b1220" stroke="#00e5a0"/>
        <text x="16" y="14" font-size="11" font-family="ui-monospace, monospace" fill="#00e5a0" text-anchor="middle" font-weight="700">×2</text>
      </g>
    </g>
    <g>
      <ellipse cx="340" cy="820" rx="56" ry="38" fill="url(#cluster-glow)"/>
      <g fill="#00e5a0">
        <circle cx="318" cy="808" r="3.5"/><circle cx="334" cy="800" r="3.5"/>
        <circle cx="350" cy="806" r="3.5"/><circle cx="368" cy="816" r="3.5"/>
        <circle cx="320" cy="822" r="3.5"/><circle cx="338" cy="820" r="3.5"/>
        <circle cx="356" cy="824" r="3.5"/><circle cx="372" cy="828" r="3.5"/>
        <circle cx="328" cy="836" r="3.5"/><circle cx="346" cy="838" r="3.5"/>
        <circle cx="362" cy="840" r="3.5"/>
      </g>
      <g transform="translate(388, 808)">
        <rect width="38" height="20" rx="10" fill="#00e5a0"/>
        <text x="19" y="14" font-size="11" font-family="ui-monospace, monospace" fill="#0b1220" text-anchor="middle" font-weight="700">×12</text>
      </g>
    </g>
    <g>
      <ellipse cx="252" cy="900" rx="34" ry="22" fill="url(#cluster-glow)"/>
      <g fill="#00e5a0">
        <circle cx="244" cy="894" r="3.5"/><circle cx="258" cy="890" r="3.5"/>
        <circle cx="252" cy="906" r="3.5"/>
      </g>
      <g transform="translate(272, 884)">
        <rect width="32" height="20" rx="10" fill="#0b1220" stroke="#00e5a0"/>
        <text x="16" y="14" font-size="11" font-family="ui-monospace, monospace" fill="#00e5a0" text-anchor="middle" font-weight="700">×4</text>
      </g>
    </g>
  </g>

  <!-- ════════ Store 4 — proposals.js (document, bottom-mid) ════════ -->
  <g>
    <circle cx="864" cy="990" r="22" fill="#0b1220" stroke="#00e5a0" stroke-width="2.5"/>
    <text x="864" y="999" font-size="22" font-weight="700" fill="#00e5a0" text-anchor="middle">4</text>
    <text x="900" y="999" font-size="30" font-weight="700" fill="#e6f7ee">proposals.js</text>

    <!-- document body -->
    <g>
      <path d="M 840 660 L 1040 660 L 1100 720 L 1100 940 L 840 940 Z"
            fill="#0e1626" stroke="#00e5a0" stroke-opacity="0.55" stroke-width="2"/>
      <path d="M 1040 660 L 1100 720 L 1040 720 Z" fill="#162338" stroke="#00e5a0" stroke-opacity="0.55" stroke-width="2"/>

      <!-- entry 1 -->
      <g transform="translate(860, 696)">
        <text x="0" y="14" font-size="12" font-family="ui-monospace, monospace" fill="#5a6a82">// from cluster ×8</text>
        <text x="0" y="34" font-size="14" font-family="ui-monospace, monospace" fill="#00e5a0" font-weight="700">function darkPlot(div, traces){</text>
        <rect x="0" y="44" width="180" height="5" rx="2" fill="#3a4458"/>
        <rect x="0" y="56" width="220" height="5" rx="2" fill="#3a4458"/>
        <text x="0" y="80" font-size="14" font-family="ui-monospace, monospace" fill="#00e5a0" font-weight="700">}</text>
        <text x="0" y="100" font-size="11" font-family="ui-monospace, monospace" fill="#7a93b0">// test:  darkPlot('#p', [...])</text>
      </g>

      <line x1="860" y1="816" x2="1080" y2="816" stroke="#1e2a3f" stroke-dasharray="3 4"/>

      <!-- entry 2 -->
      <g transform="translate(860, 832)">
        <text x="0" y="14" font-size="12" font-family="ui-monospace, monospace" fill="#5a6a82">// from cluster ×12</text>
        <text x="0" y="34" font-size="14" font-family="ui-monospace, monospace" fill="#00e5a0" font-weight="700">function scrubber(input, cb){</text>
        <rect x="0" y="44" width="200" height="5" rx="2" fill="#3a4458"/>
        <text x="0" y="64" font-size="14" font-family="ui-monospace, monospace" fill="#00e5a0" font-weight="700">}</text>
      </g>
    </g>
  </g>

  <!-- ════════ Store 6 — library.js (document, bottom-right) ════════ -->
  <g>
    <circle cx="1494" cy="990" r="22" fill="#0b1220" stroke="#00e5a0" stroke-width="2.5"/>
    <text x="1494" y="999" font-size="22" font-weight="700" fill="#00e5a0" text-anchor="middle">6</text>
    <text x="1530" y="999" font-size="30" font-weight="700" fill="#e6f7ee">library.js</text>

    <!-- document body -->
    <g>
      <path d="M 1470 660 L 1670 660 L 1730 720 L 1730 940 L 1470 940 Z"
            fill="#0e1626" stroke="#00e5a0" stroke-width="2.5"/>
      <path d="M 1670 660 L 1730 720 L 1670 720 Z" fill="#162338" stroke="#00e5a0" stroke-width="2.5"/>

      <!-- skill list -->
      <g transform="translate(1490, 694)">
        <text x="0" y="14" font-size="13" font-family="ui-monospace, monospace" fill="#7a93b0">7 skills · embedding-indexed</text>
        <line x1="0" y1="28" x2="220" y2="28" stroke="#1e2a3f"/>
        <g font-size="14" font-family="ui-monospace, monospace" fill="#cfdcec">
          <text x="0" y="56">+ darkPlot</text>
          <g transform="translate(180, 42)">
            <rect width="40" height="18" rx="9" fill="#00e5a0"/>
            <text x="20" y="13" font-size="10" font-weight="700" fill="#0b1220" text-anchor="middle">NEW</text>
          </g>
          <text x="0" y="82">+ scrubber</text>
          <text x="0" y="108">+ controlsRow</text>
          <text x="0" y="134">+ katexBind</text>
          <text x="0" y="160">+ mathStep</text>
          <text x="0" y="186">+ darkLayout</text>
          <text x="0" y="212">+ axisGrid</text>
        </g>
      </g>
    </g>
  </g>

  <!-- ════════ Arrows: zig-zag flow ════════ -->
  <g fill="none" stroke="#00e5a0" stroke-width="3">
    <!-- 1 → 2: vertical down -->
    <line x1="330" y1="520" x2="330" y2="635" marker-end="url(#arrow)"/>
    <!-- 3 → 4: vertical down -->
    <line x1="960" y1="520" x2="960" y2="635" marker-end="url(#arrow)"/>
    <!-- 5 → 6: vertical down -->
    <line x1="1590" y1="520" x2="1590" y2="635" marker-end="url(#arrow)"/>

    <!-- 2 → 3: diagonal up-right (read from VectorDB to Sweeper) -->
    <path d="M 460 720 C 600 720, 700 540, 820 470" marker-end="url(#arrow)"/>
    <!-- 4 → 5: diagonal up-right (read proposal to Merger) -->
    <path d="M 1100 720 C 1240 720, 1330 540, 1450 470" marker-end="url(#arrow)"/>
  </g>

  <!-- arrow labels -->
  <g font-size="14" font-style="italic" fill="#00e5a0">
    <text x="344" y="580">writes candidate</text>
    <text x="974" y="580">writes proposal</text>
    <text x="1604" y="580">execute · merge</text>
    <text x="640" y="544" text-anchor="middle">reads buckets</text>
    <text x="1280" y="544" text-anchor="middle">reads proposal</text>
  </g>

  <!-- Cite footer -->
  <g transform="translate(100, 1050)">
    <text x="0" y="0" font-size="16" fill="#9bb0c9">vs <tspan font-weight="700" fill="#e6f7ee">Voyager (Wang 2023)</tspan> — promoted on first env-success. Ours adds <tspan fill="#00e5a0" font-weight="700">quorum</tspan> + <tspan fill="#00e5a0" font-weight="700">execution oracle</tspan> + <tspan fill="#00e5a0" font-weight="700">staging</tspan> · three gates instead of one</text>
  </g>
</svg>
