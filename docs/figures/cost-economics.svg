<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#080e1a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121a2a"/>
      <stop offset="1" stop-color="#0e1626"/>
    </linearGradient>
    <linearGradient id="curveFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00e5a0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00e5a0" stop-opacity="0.02"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#94a3b8" fill-opacity="0.04"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>

  <!-- HEADER -->
  <text x="80" y="64" font-size="14" font-weight="600" letter-spacing="3" fill="#00e5a0">FIGURE · COST ECONOMICS</text>
  <text x="80" y="116" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="-0.4">Token cost compounds down with usage</text>
  <text x="80" y="148" font-size="16" fill="#94a3b8">Real measurements from <tspan font-weight="700" fill="#ffffff">two weeks of internal dev + testing</tspan> · 25 generations · ground-truth, not extrapolated. Each generation feeds the skill library. Future ones call into primitives instead of re-emitting glue.</text>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- CHART · x=80-1280, y=190-770                                       -->
  <!-- Plot area: x=160-1240, y=240-700                                   -->
  <!-- Y range: 60% (bottom) to 100% (top)                                -->
  <!-- X range: 0 to 100 generations                                      -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="80" y="190" width="1200" height="580" rx="14" fill="url(#card)" stroke="#1e293b" stroke-width="1.2"/>
    <rect x="80" y="190" width="1200" height="3" fill="#00e5a0"/>
  </g>

  <!-- Chart title -->
  <text x="106" y="226" font-size="13" font-weight="700" letter-spacing="2.4" fill="#00e5a0">TOKENS PER GENERATION</text>

  <!-- Y-axis grid lines + labels -->
  <g stroke="#1e293b" stroke-width="1" stroke-dasharray="3 4">
    <line x1="160" y1="240" x2="1240" y2="240"/>
    <line x1="160" y1="355" x2="1240" y2="355"/>
    <line x1="160" y1="470" x2="1240" y2="470"/>
    <line x1="160" y1="585" x2="1240" y2="585"/>
    <line x1="160" y1="700" x2="1240" y2="700"/>
  </g>
  <g font-size="11" font-family="JetBrains Mono, ui-monospace, monospace" fill="#94a3b8" text-anchor="end">
    <text x="148" y="244">100%</text>
    <text x="148" y="359">90%</text>
    <text x="148" y="474">80%</text>
    <text x="148" y="589">70%</text>
    <text x="148" y="704">60%</text>
  </g>

  <!-- Y-axis label -->
  <text x="56" y="470" font-size="12" font-weight="700" letter-spacing="2.2" fill="#64748b" transform="rotate(-90 56 470)" text-anchor="middle">TOKENS · % OF BASELINE</text>

  <!-- X-axis line -->
  <line x1="160" y1="700" x2="1240" y2="700" stroke="#475569" stroke-width="1.6"/>

  <!-- X-axis ticks + labels -->
  <g stroke="#475569" stroke-width="1.4">
    <line x1="160" y1="700" x2="160" y2="708"/>
    <line x1="430" y1="700" x2="430" y2="708"/>
    <line x1="700" y1="700" x2="700" y2="708"/>
    <line x1="970" y1="700" x2="970" y2="708"/>
    <line x1="1240" y1="700" x2="1240" y2="708"/>
  </g>
  <g font-size="11" font-family="JetBrains Mono, ui-monospace, monospace" fill="#94a3b8" text-anchor="middle">
    <text x="160" y="724">0</text>
    <text x="430" y="724">25</text>
    <text x="700" y="724">50</text>
    <text x="970" y="724">75</text>
    <text x="1240" y="724">100</text>
  </g>
  <text x="700" y="752" font-size="12" font-weight="700" letter-spacing="2.2" fill="#64748b" text-anchor="middle">GENERATION COUNT (N)</text>

  <!-- ─── Measurement boundary (gen=25) — vertical separator ─── -->
  <g>
    <line x1="430" y1="240" x2="430" y2="700" stroke="#fbbf24" stroke-width="1.4" stroke-dasharray="6 4" opacity="0.55"/>
    <rect x="376" y="247" width="108" height="22" rx="3" fill="#0b1220" stroke="#fbbf24" stroke-opacity="0.5"/>
    <text x="430" y="263" font-size="11" font-weight="700" letter-spacing="1.4" fill="#fbbf24" text-anchor="middle">N = 25 · TODAY</text>
  </g>

  <!-- ─── Asymptote (theoretical floor at cost=70%) ─── -->
  <g opacity="0.55">
    <line x1="160" y1="585" x2="1240" y2="585" stroke="#475569" stroke-width="1.2" stroke-dasharray="3 3"/>
    <rect x="170" y="574" width="160" height="22" rx="3" fill="#0b1220"/>
    <text x="178" y="590" font-size="10" font-style="italic" fill="#94a3b8">theoretical floor (~70%)</text>
  </g>

  <!-- ─── Curve fill (under measured + projected) ─── -->
  <path d="M 171 240 C 280 280, 360 320, 430 355 C 600 400, 900 478, 1240 527 L 1240 700 L 171 700 Z" fill="url(#curveFill)"/>

  <!-- ─── Measured region · solid mint curve (gen 1-25) ─── -->
  <path d="M 171 240 C 280 280, 360 320, 430 355" stroke="#00e5a0" stroke-width="3.2" fill="none" stroke-linecap="round"/>

  <!-- ─── Projected region · dashed mint curve (gen 25-100+) ─── -->
  <path d="M 430 355 C 600 400, 900 478, 1240 527" stroke="#00e5a0" stroke-width="3" stroke-dasharray="8 6" fill="none" stroke-linecap="round"/>

  <!-- ─── Data points (sampled measured generations) ─── -->
  <g fill="#00e5a0" stroke="#0b1220" stroke-width="2">
    <circle cx="171" cy="240" r="5"/>
    <circle cx="214" cy="263" r="4"/>
    <circle cx="268" cy="297" r="4"/>
    <circle cx="322" cy="320" r="4"/>
    <circle cx="376" cy="343" r="4"/>
    <circle cx="430" cy="355" r="6"/>
  </g>

  <!-- ─── Annotations along the curve ─── -->

  <!-- Today marker (gen 25) — placed in measured region below curve, leader up-right to data point -->
  <g transform="translate(200, 400)">
    <line x1="220" y1="-10" x2="230" y2="-45" stroke="#00e5a0" stroke-width="1.6"/>
    <rect x="0" y="0" width="226" height="56" rx="4" fill="#0b1220" stroke="#00e5a0" stroke-width="1.4"/>
    <text x="14" y="22" font-size="11" font-weight="700" letter-spacing="1.4" fill="#00e5a0">TODAY · 7 SKILLS IN LIBRARY</text>
    <text x="14" y="42" font-size="11" fill="#cbd5e1">cost ≈ <tspan font-weight="700" fill="#00e5a0">90.2%</tspan> of baseline (9.8% saved)</text>
  </g>

  <!-- Projected milestone (gen 50) -->
  <g transform="translate(700, 447)">
    <circle cx="0" cy="0" r="5" fill="#475569" stroke="#0b1220" stroke-width="2"/>
    <line x1="0" y1="0" x2="-20" y2="40" stroke="#475569" stroke-width="1.2" stroke-dasharray="3 3"/>
    <rect x="-150" y="40" width="170" height="36" rx="3" fill="#0b1220" stroke="#1e293b"/>
    <text x="-65" y="56" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle">gen 50 · ~15 skills</text>
    <text x="-65" y="72" font-size="11" fill="#94a3b8" text-anchor="middle">projected ≈ 82%</text>
  </g>

  <!-- Projected milestone (gen 100) -->
  <g transform="translate(1240, 527)">
    <circle cx="0" cy="0" r="5" fill="#475569" stroke="#0b1220" stroke-width="2"/>
    <line x1="0" y1="0" x2="-30" y2="60" stroke="#475569" stroke-width="1.2" stroke-dasharray="3 3"/>
    <rect x="-200" y="60" width="194" height="36" rx="3" fill="#0b1220" stroke="#1e293b"/>
    <text x="-103" y="76" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle">gen 100 · ~25 skills</text>
    <text x="-103" y="92" font-size="11" fill="#94a3b8" text-anchor="middle">projected ≈ 75%</text>
  </g>

  <!-- Region labels -->
  <g>
    <rect x="240" y="678" width="86" height="18" rx="3" fill="#0b1220"/>
    <text x="283" y="692" font-size="10" font-weight="700" letter-spacing="1.6" fill="#00e5a0" text-anchor="middle">MEASURED</text>
  </g>
  <g>
    <rect x="780" y="678" width="100" height="18" rx="3" fill="#0b1220"/>
    <text x="830" y="692" font-size="10" font-weight="700" letter-spacing="1.6" fill="#94a3b8" text-anchor="middle">PROJECTED</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- RIGHT-SIDE STATS PANEL                                             -->
  <!-- x=1320-1840, y=190-770                                             -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="1320" y="190" width="520" height="580" rx="14" fill="url(#card)" stroke="#00e5a0" stroke-width="1.4"/>
    <rect x="1320" y="190" width="520" height="3" fill="#00e5a0"/>
  </g>

  <text x="1346" y="226" font-size="13" font-weight="700" letter-spacing="2.4" fill="#00e5a0">MEASURED · 2-WEEK BUILD</text>
  <text x="1346" y="246" font-size="11" font-style="italic" fill="#94a3b8">real generations from internal dev + testing · not synthetic</text>

  <line x1="1346" y1="266" x2="1814" y2="266" stroke="#1e293b"/>

  <!-- Stat 1: avg reduction -->
  <g transform="translate(1346, 290)">
    <text x="0" y="22" font-size="68" font-weight="700" fill="#00e5a0">9.8%</text>
    <text x="200" y="14" font-size="13" font-weight="700" letter-spacing="2" fill="#cbd5e1">AVERAGE</text>
    <text x="200" y="34" font-size="13" fill="#94a3b8">output-token reduction</text>
    <text x="200" y="50" font-size="13" fill="#94a3b8">across 25 generations</text>
  </g>

  <line x1="1346" y1="376" x2="1814" y2="376" stroke="#1e293b"/>

  <!-- Stat 2: best -->
  <g transform="translate(1346, 396)">
    <text x="0" y="22" font-size="56" font-weight="700" fill="#00e5a0">19.5%</text>
    <text x="200" y="14" font-size="13" font-weight="700" letter-spacing="2" fill="#cbd5e1">BEST GENERATION</text>
    <text x="200" y="34" font-size="13" fill="#94a3b8">peak savings on a single</text>
    <text x="200" y="50" font-size="13" fill="#94a3b8">lesson that hit 5+ skills</text>
  </g>

  <line x1="1346" y1="478" x2="1814" y2="478" stroke="#1e293b"/>

  <!-- Stat 3: top quartile -->
  <g transform="translate(1346, 498)">
    <text x="0" y="22" font-size="56" font-weight="700" fill="#00e5a0">14%+</text>
    <text x="200" y="14" font-size="13" font-weight="700" letter-spacing="2" fill="#cbd5e1">TOP QUARTILE</text>
    <text x="200" y="34" font-size="13" fill="#94a3b8">25% of generations save</text>
    <text x="200" y="50" font-size="13" fill="#94a3b8">14% or more</text>
  </g>

  <line x1="1346" y1="580" x2="1814" y2="580" stroke="#1e293b"/>

  <!-- Recurrence box -->
  <g transform="translate(1346, 600)">
    <text x="0" y="14" font-size="13" font-weight="700" letter-spacing="2" fill="#cbd5e1">SKILL RECURRENCE</text>
    <text x="0" y="34" font-size="12" font-style="italic" fill="#94a3b8">how often the top primitives appear</text>
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="240" height="30" rx="4" fill="#0a1322" stroke="#00e5a0" stroke-opacity="0.4"/>
      <rect x="0" y="0" width="153" height="30" rx="4" fill="#00e5a0" fill-opacity="0.18"/>
      <text x="14" y="20" font-size="13" font-weight="700" fill="#00e5a0" font-family="JetBrains Mono, ui-monospace, monospace">darkPlot</text>
      <text x="226" y="20" font-size="13" font-weight="700" fill="#cbd5e1" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace">16/25</text>
    </g>
    <g transform="translate(0, 90)">
      <rect x="0" y="0" width="240" height="30" rx="4" fill="#0a1322" stroke="#00e5a0" stroke-opacity="0.4"/>
      <rect x="0" y="0" width="182" height="30" rx="4" fill="#00e5a0" fill-opacity="0.18"/>
      <text x="14" y="20" font-size="13" font-weight="700" fill="#00e5a0" font-family="JetBrains Mono, ui-monospace, monospace">scrubber</text>
      <text x="226" y="20" font-size="13" font-weight="700" fill="#cbd5e1" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace">19/25</text>
    </g>
  </g>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- BOTTOM CALLOUT                                                     -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <g transform="translate(80, 820)">
    <rect x="0" y="0" width="1760" height="100" rx="12" fill="#121a2a" stroke="#00e5a0" stroke-width="1.4" stroke-opacity="0.6"/>
    <text x="30" y="36" font-size="14" font-weight="700" letter-spacing="2.4" fill="#00e5a0">THE MOAT · ALREADY PROVEN</text>
    <text x="30" y="68" font-size="18" fill="#cbd5e1">
      Competitors pay the <tspan font-weight="700" fill="#ffffff">same flat per-query cost</tspan> in year 5 as in year 1. Ours dropped <tspan font-weight="700" fill="#00e5a0">9.8%</tspan> in two weeks of internal use.
    </text>
    <text x="30" y="90" font-size="15" fill="#94a3b8">
      <tspan font-style="italic">Every generated lesson makes the next one cheaper.</tspan>
      <tspan dx="14" font-weight="700" fill="#00e5a0">Margin expands with usage. The trend is real, not a forecast.</tspan>
    </text>
  </g>

  <!-- Footer caveat -->
  <text x="80" y="958" font-size="12" font-style="italic" fill="#64748b">Measured: 25 real generations over 2 weeks of internal dev + testing — no synthetic data. Dashed projection assumes continued sub-linear growth in unique skills; re-validated at each milestone.</text>
</svg>
