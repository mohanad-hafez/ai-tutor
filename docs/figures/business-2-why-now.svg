<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#080e1a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121a2a"/>
      <stop offset="1" stop-color="#0e1626"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#94a3b8" fill-opacity="0.04"/>
    </pattern>
    <marker id="arr-mint" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#00e5a0"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>

  <!-- Header -->
  <text x="80" y="64" font-size="14" font-weight="600" letter-spacing="3" fill="#00e5a0">WHY NOW</text>
  <text x="80" y="116" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="-0.4">This works in 2026, not 2024</text>
  <text x="80" y="148" font-size="16" fill="#94a3b8">Two platform shifts made it possible. Our token-efficiency moat made it economical. None of these were true 18 months ago.</text>

  <!-- Timeline arrow at top -->
  <g transform="translate(80, 220)">
    <line x1="0" y1="20" x2="1760" y2="20" stroke="#475569" stroke-width="2" marker-end="url(#arr-mint)"/>
    <text x="0" y="50" font-size="13" font-weight="700" letter-spacing="2.4" fill="#94a3b8">2024</text>
    <text x="1760" y="50" font-size="13" font-weight="700" letter-spacing="2.4" fill="#00e5a0" text-anchor="end">TODAY · 2026</text>
    <!-- 3 milestone dots along timeline -->
    <circle cx="293" cy="20" r="9" fill="#0b1220" stroke="#00e5a0" stroke-width="2.5"/>
    <circle cx="880" cy="20" r="9" fill="#0b1220" stroke="#00e5a0" stroke-width="2.5"/>
    <circle cx="1467" cy="20" r="9" fill="#0b1220" stroke="#00e5a0" stroke-width="2.5"/>
  </g>

  <!-- 3 cards · w=560, gap=40, x=80, y=320 -->

  <!-- Card 1: Tool-use went production -->
  <g filter="url(#shadow)">
    <rect x="80" y="320" width="560" height="600" rx="14" fill="url(#card)" stroke="#1e293b" stroke-width="1.2"/>
    <rect x="80" y="320" width="560" height="3" fill="#00e5a0"/>
    <!-- icon -->
    <g transform="translate(112, 360)" stroke="#00e5a0" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 0 12 L 10 22 L 30 0"/>
    </g>
    <text x="112" y="430" font-size="14" font-weight="700" letter-spacing="2" fill="#00e5a0">SHIFT 1 · DEC 2024</text>
    <text x="112" y="476" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="-0.3">Forced tool-use</text>
    <text x="112" y="508" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="-0.3">went production-grade</text>
    <line x1="112" y1="540" x2="608" y2="540" stroke="#1e293b"/>
    <text x="112" y="580" font-size="15" fill="#cbd5e1">Anthropic's December 2024 release made structured</text>
    <text x="112" y="602" font-size="15" fill="#cbd5e1">JSON output reliable enough to chain 5+ agents</text>
    <text x="112" y="624" font-size="15" fill="#cbd5e1">without parser hacks or retry loops.</text>
    <text x="112" y="676" font-size="13" font-style="italic" fill="#94a3b8">Before this: model would hallucinate JSON shapes.</text>
    <text x="112" y="698" font-size="13" font-style="italic" fill="#94a3b8">Whole pipeline architecture was infeasible.</text>
    <g transform="translate(112, 740)">
      <rect x="0" y="0" width="180" height="32" rx="16" fill="#00e5a0" fill-opacity="0.12" stroke="#00e5a0" stroke-width="1"/>
      <text x="90" y="20" font-size="12" font-weight="700" letter-spacing="1.6" fill="#00e5a0" text-anchor="middle">UNLOCKED ARCHITECTURE</text>
    </g>
  </g>

  <!-- Card 2: Inference cost dropped -->
  <g filter="url(#shadow)">
    <rect x="680" y="320" width="560" height="600" rx="14" fill="url(#card)" stroke="#1e293b" stroke-width="1.2"/>
    <rect x="680" y="320" width="560" height="3" fill="#00e5a0"/>
    <g transform="translate(712, 360)" stroke="#00e5a0" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 4 4 L 30 4 L 30 22 L 4 22 Z"/>
      <path d="M 14 22 L 14 28 L 20 28 L 20 22"/>
      <path d="M 9 9 L 13 13 L 17 11 L 22 16 L 26 14"/>
    </g>
    <text x="712" y="430" font-size="14" font-weight="700" letter-spacing="2" fill="#00e5a0">SHIFT 2 · 2023→2026</text>
    <text x="712" y="476" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="-0.3">Inference cost dropped</text>
    <text x="712" y="508" font-size="28" font-weight="700" fill="#00e5a0" letter-spacing="-0.3">~10× in 18 months</text>
    <line x1="712" y1="540" x2="1208" y2="540" stroke="#1e293b"/>
    <text x="712" y="580" font-size="15" fill="#cbd5e1">Haiku 4.5 makes the per-iframe Verifier loop</text>
    <text x="712" y="602" font-size="15" fill="#cbd5e1">economically viable. Pricing flipped from</text>
    <text x="712" y="624" font-size="15" fill="#cbd5e1">"can't afford to verify" to "can't afford NOT to."</text>
    <text x="712" y="676" font-size="13" font-style="italic" fill="#94a3b8">Before: every Verifier call = burnt money.</text>
    <text x="712" y="698" font-size="13" font-style="italic" fill="#94a3b8">Now: cheap async oracle on every render.</text>
    <g transform="translate(712, 740)">
      <rect x="0" y="0" width="180" height="32" rx="16" fill="#00e5a0" fill-opacity="0.12" stroke="#00e5a0" stroke-width="1"/>
      <text x="90" y="20" font-size="12" font-weight="700" letter-spacing="1.6" fill="#00e5a0" text-anchor="middle">UNLOCKED ECONOMICS</text>
    </g>
  </g>

  <!-- Card 3: Token efficiency was the missing piece (OURS) -->
  <g filter="url(#shadow)">
    <rect x="1280" y="320" width="560" height="600" rx="14" fill="url(#card)" stroke="#00e5a0" stroke-width="2"/>
    <rect x="1280" y="320" width="560" height="3" fill="#00e5a0"/>
    <g transform="translate(1312, 360)" stroke="#00e5a0" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="6" width="32" height="22" rx="2"/>
      <line x1="0" y1="14" x2="32" y2="14"/>
      <path d="M 8 21 L 12 25 L 18 17"/>
    </g>
    <text x="1312" y="430" font-size="14" font-weight="700" letter-spacing="2" fill="#00e5a0">SHIFT 3 · OUR CONTRIBUTION</text>
    <text x="1312" y="476" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="-0.3">Token efficiency</text>
    <text x="1312" y="508" font-size="28" font-weight="700" fill="#00e5a0" letter-spacing="-0.3">we cracked the moat</text>
    <line x1="1312" y1="540" x2="1808" y2="540" stroke="#1e293b"/>
    <text x="1312" y="580" font-size="15" fill="#cbd5e1">Even with cheap inference, naive token usage</text>
    <text x="1312" y="602" font-size="15" fill="#cbd5e1">would've killed this at scale. Our skill library</text>
    <text x="1312" y="624" font-size="15" fill="#cbd5e1">compounds savings — cost per gen trends DOWN.</text>
    <text x="1312" y="676" font-size="13" font-style="italic" fill="#94a3b8">Why no one shipped this before: unit economics</text>
    <text x="1312" y="698" font-size="13" font-style="italic" fill="#94a3b8">didn't work. Library moat is the unlock.</text>
    <g transform="translate(1312, 740)">
      <rect x="0" y="0" width="240" height="32" rx="16" fill="#00e5a0" fill-opacity="0.12" stroke="#00e5a0" stroke-width="1"/>
      <text x="120" y="20" font-size="12" font-weight="700" letter-spacing="1.6" fill="#00e5a0" text-anchor="middle">UNLOCKED · MEASURED −9.8%</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(80, 950)">
    <rect x="0" y="0" width="1760" height="80" rx="12" fill="#121a2a" stroke="#00e5a0" stroke-width="1.4" stroke-opacity="0.6"/>
    <text x="30" y="34" font-size="14" font-weight="700" letter-spacing="2.4" fill="#00e5a0">THE TIMING</text>
    <text x="30" y="64" font-size="17" fill="#cbd5e1">
      AI got smart · inference got cheap — but <tspan font-weight="700" fill="#ffffff">naive cost still killed unit economics.</tspan>
      <tspan dx="14" font-weight="700" fill="#00e5a0">Our library moat is the missing piece.</tspan>
    </text>
  </g>
</svg>
