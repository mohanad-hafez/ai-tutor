<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a10"/><stop offset="1" stop-color="#070710"/>
    </linearGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12121e"/><stop offset="1" stop-color="#0c0c18"/>
    </linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10Z" fill="#6366f1"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10Z" fill="#34d399"/>
    </marker>
    <marker id="ay" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10Z" fill="#fbbf24"/>
    </marker>
    <marker id="az" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10Z" fill="#52525b"/>
    </marker>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#a1a1aa"/>
    </pattern>
  </defs>

  <rect width="1100" height="780" fill="url(#bg)"/>
  <rect width="1100" height="780" fill="url(#dots)" opacity="0.04"/>

  <!-- Header -->
  <text x="50" y="46" font-size="11" font-weight="600" letter-spacing="3" fill="#6366f1">HACKATHON ROUND 2 · ARCHITECTURE</text>
  <text x="50" y="78" font-size="28" font-weight="700" fill="#f5f5f7" letter-spacing="-0.5">AI Visual Learning Tutor</text>
  <text x="50" y="100" font-size="13" fill="#a1a1aa">Multi-agent pipeline: highlight text in a PDF → get an interactive lesson on a live knowledge graph</text>

  <!-- ── USER INPUT ── -->
  <g transform="translate(50,126)">
    <rect width="180" height="56" rx="10" fill="url(#cg)" stroke="#38bdf8" stroke-width="1.2"/>
    <rect width="180" height="3" rx="1.5" fill="#38bdf8"/>
    <text x="90" y="28" font-size="12" font-weight="700" fill="#bae6fd" text-anchor="middle">User</text>
    <text x="90" y="44" font-size="10" fill="#71717a" text-anchor="middle">highlights text in PDF</text>
  </g>

  <!-- Arrow user → memory -->
  <line x1="230" y1="154" x2="290" y2="154" stroke="#6366f1" stroke-width="1.8" marker-end="url(#a)"/>
  <text x="248" y="147" font-size="9" fill="#6366f1">query</text>

  <!-- ── MEMORY AGENT ── -->
  <g transform="translate(290,126)">
    <rect width="148" height="56" rx="10" fill="url(#cg)" stroke="#a78bfa" stroke-width="1.2"/>
    <rect width="148" height="3" rx="1.5" fill="#a78bfa"/>
    <text x="74" y="24" font-size="11" font-weight="700" fill="#ddd6fe" text-anchor="middle">① Memory</text>
    <text x="74" y="38" font-size="9" fill="#a1a1aa" text-anchor="middle">MiniLM-L6 · cosine sim</text>
    <text x="74" y="50" font-size="9" fill="#a1a1aa" text-anchor="middle">dedup · redirect · cache</text>
  </g>

  <!-- Arrow memory → router -->
  <line x1="438" y1="154" x2="498" y2="154" stroke="#6366f1" stroke-width="1.8" marker-end="url(#a)"/>
  <text x="445" y="147" font-size="9" fill="#6366f1">miss</text>

  <!-- ── ROUTER AGENT ── -->
  <g transform="translate(498,126)">
    <rect width="148" height="56" rx="10" fill="url(#cg)" stroke="#38bdf8" stroke-width="1.2"/>
    <rect width="148" height="3" rx="1.5" fill="#38bdf8"/>
    <text x="74" y="24" font-size="11" font-weight="700" fill="#bae6fd" text-anchor="middle">② Router</text>
    <text x="74" y="38" font-size="9" fill="#a1a1aa" text-anchor="middle">Claude Haiku</text>
    <text x="74" y="50" font-size="9" fill="#a1a1aa" text-anchor="middle">visual_html / video / text</text>
  </g>

  <!-- Arrow router → retriever -->
  <line x1="646" y1="154" x2="706" y2="154" stroke="#6366f1" stroke-width="1.8" marker-end="url(#a)"/>
  <text x="652" y="147" font-size="9" fill="#6366f1">mode</text>

  <!-- ── RETRIEVER ── -->
  <g transform="translate(706,126)">
    <rect width="148" height="56" rx="10" fill="url(#cg)" stroke="#34d399" stroke-width="1.2"/>
    <rect width="148" height="3" rx="1.5" fill="#34d399"/>
    <text x="74" y="24" font-size="11" font-weight="700" fill="#bbf7d0" text-anchor="middle">③ Retriever</text>
    <text x="74" y="38" font-size="9" fill="#a1a1aa" text-anchor="middle">BM25 · local · top-4</text>
    <text x="74" y="50" font-size="9" fill="#a1a1aa" text-anchor="middle">grounds lesson in PDF</text>
  </g>

  <!-- Arrow retriever → planner (going down) -->
  <line x1="780" y1="182" x2="780" y2="222" stroke="#6366f1" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- ── PLANNER ── -->
  <g transform="translate(620,222)">
    <rect width="320" height="60" rx="10" fill="url(#cg)" stroke="#818cf8" stroke-width="1.2"/>
    <rect width="320" height="3" rx="1.5" fill="#818cf8"/>
    <text x="160" y="26" font-size="11" font-weight="700" fill="#c7d2fe" text-anchor="middle">④ Planner</text>
    <text x="160" y="40" font-size="9" fill="#a1a1aa" text-anchor="middle">Claude Sonnet · emit_plan tool · 2–4 teaching beats + viz ideas</text>
    <text x="160" y="54" font-size="9" fill="#71717a" text-anchor="middle">prerequisites · manim_brief (video only)</text>
  </g>

  <!-- Arrow planner → branch -->
  <line x1="780" y1="282" x2="780" y2="318" stroke="#6366f1" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- ── BRANCH LABEL ── -->
  <text x="688" y="314" font-size="10" font-weight="600" fill="#fbbf24">mode branch</text>

  <!-- Branch line -->
  <line x1="560" y1="318" x2="1000" y2="318" stroke="#27272a" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- ── LEFT BRANCH: text/visual_html ── -->
  <!-- Author -->
  <g transform="translate(430,332)">
    <rect width="200" height="60" rx="10" fill="url(#cg)" stroke="#a78bfa" stroke-width="1.2"/>
    <rect width="200" height="3" rx="1.5" fill="#a78bfa"/>
    <text x="100" y="26" font-size="11" font-weight="700" fill="#ddd6fe" text-anchor="middle">⑤ Author</text>
    <text x="100" y="40" font-size="9" fill="#a1a1aa" text-anchor="middle">Claude Sonnet · emit_content tool</text>
    <text x="100" y="54" font-size="9" fill="#a1a1aa" text-anchor="middle">streams HTML/CSS/JS → iframe</text>
  </g>
  <line x1="560" y1="318" x2="530" y2="332" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Critic -->
  <g transform="translate(430,414)">
    <rect width="200" height="56" rx="10" fill="url(#cg)" stroke="#fbbf24" stroke-width="1.2"/>
    <rect width="200" height="3" rx="1.5" fill="#fbbf24"/>
    <text x="100" y="24" font-size="11" font-weight="700" fill="#fef3c7" text-anchor="middle">⑥ Critic</text>
    <text x="100" y="38" font-size="9" fill="#a1a1aa" text-anchor="middle">Claude Haiku · critique_lesson</text>
    <text x="100" y="52" font-size="9" fill="#a1a1aa" text-anchor="middle">pedagogical fit · JS bugs</text>
  </g>
  <line x1="530" y1="392" x2="530" y2="414" stroke="#6366f1" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Refiner (conditional) -->
  <g transform="translate(430,492)">
    <rect width="200" height="56" rx="10" fill="url(#cg)" stroke="#fb7185" stroke-width="1.2" stroke-dasharray="4 3"/>
    <rect width="200" height="3" rx="1.5" fill="#fb7185"/>
    <text x="100" y="24" font-size="11" font-weight="700" fill="#fecdd3" text-anchor="middle">⑦ Refiner</text>
    <text x="100" y="38" font-size="9" fill="#a1a1aa" text-anchor="middle">Claude Sonnet · conditional</text>
    <text x="100" y="52" font-size="9" fill="#71717a" text-anchor="middle">only runs if Critic flags issues</text>
  </g>
  <line x1="530" y1="470" x2="530" y2="492" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ay)"/>
  <text x="536" y="484" font-size="9" fill="#fbbf24">issues?</text>

  <!-- ── RIGHT BRANCH: video_manim ── -->
  <g transform="translate(820,332)">
    <rect width="200" height="56" rx="10" fill="url(#cg)" stroke="#34d399" stroke-width="1.2"/>
    <rect width="200" height="3" rx="1.5" fill="#34d399"/>
    <text x="100" y="24" font-size="11" font-weight="700" fill="#bbf7d0" text-anchor="middle">Manim Worker</text>
    <text x="100" y="38" font-size="9" fill="#a1a1aa" text-anchor="middle">Python · scene.py via stdin</text>
    <text x="100" y="52" font-size="9" fill="#a1a1aa" text-anchor="middle">gTTS narration · FFmpeg mp4</text>
  </g>
  <line x1="1000" y1="318" x2="920" y2="332" stroke="#34d399" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- video SSE label -->
  <text x="832" y="314" font-size="9" fill="#34d399">video_manim</text>

  <!-- ── CACHE / MEMORY STORE (right side) ── -->
  <g transform="translate(50,240)">
    <rect width="220" height="120" rx="10" fill="url(#cg)" stroke="#71717a" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="110" y="22" font-size="11" font-weight="700" fill="#d4d4d8" text-anchor="middle">Memory &amp; Cache</text>
    <line x1="14" y1="30" x2="206" y2="30" stroke="#27272a"/>
    <text x="14" y="48" font-size="10" font-weight="600" fill="#a78bfa">Semantic Vector Index</text>
    <text x="14" y="62" font-size="9" fill="#71717a">MiniLM-L6 embeddings · cosine · persistent</text>
    <text x="14" y="78" font-size="10" font-weight="600" fill="#fbbf24">Hash Result Cache</text>
    <text x="14" y="92" font-size="9" fill="#71717a">SHA256(inputs) → JSON/mp4 · ~30 ms hit</text>
    <text x="14" y="108" font-size="10" font-weight="600" fill="#34d399">BM25 Document Index</text>
    <text x="14" y="120" font-size="9" fill="#71717a" dy="-2">600-token windows · per-PDF</text>
  </g>

  <!-- Arrow memory agent ↔ store -->
  <line x1="270" y1="182" x2="200" y2="240" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#a)"/>

  <!-- ── OUTPUT ── -->
  <g transform="translate(50,510)">
    <rect width="340" height="56" rx="10" fill="url(#cg)" stroke="#38bdf8" stroke-width="1.2"/>
    <rect width="340" height="3" rx="1.5" fill="#38bdf8"/>
    <text x="170" y="24" font-size="11" font-weight="700" fill="#bae6fd" text-anchor="middle">Lesson Canvas (ReactFlow)</text>
    <text x="170" y="40" font-size="9" fill="#a1a1aa" text-anchor="middle">Node appears · iframe preview · Agent Trace Panel</text>
    <text x="170" y="52" font-size="9" fill="#71717a" text-anchor="middle">child highlights spawn sub-lessons → knowledge graph</text>
  </g>

  <!-- Arrow refiner → canvas -->
  <line x1="490" y1="548" x2="390" y2="548" stroke="#34d399" stroke-width="1.8" marker-end="url(#ag)"/>
  <text x="412" y="541" font-size="9" fill="#34d399">complete SSE</text>

  <!-- Arrow manim → canvas -->
  <path d="M 920 388 C 920 460, 390 520, 390 538" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#ag)"/>

  <!-- ── SSE label ── -->
  <text x="50" y="600" font-size="10" fill="#a1a1aa">SSE stream: <tspan fill="#6366f1">agent_step</tspan> · <tspan fill="#fbbf24">partial</tspan> · <tspan fill="#34d399">complete</tspan> — every agent step visible in real time</text>

  <!-- ── ANTHROPIC API BOX ── -->
  <g transform="translate(430,592)">
    <rect width="590" height="48" rx="10" fill="#0e0e1a" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1"/>
    <text x="14" y="18" font-size="10" font-weight="700" letter-spacing="1.5" fill="#a78bfa">ANTHROPIC API</text>
    <text x="130" y="18" font-size="10" fill="#71717a">claude-sonnet-4-6 → Planner · Author · Refiner</text>
    <text x="14" y="36" font-size="10" fill="#71717a">claude-haiku-4-5 → Router · Critic</text>
    <text x="230" y="36" font-size="10" fill="#71717a">Forced tool-use · Streaming · Prompt caching (ephemeral)</text>
  </g>

  <!-- ── LEGEND ── -->
  <g transform="translate(50,660)">
    <text x="0" y="0" font-size="10" font-weight="700" letter-spacing="2" fill="#52525b">LEGEND</text>
    <line x1="0" y1="8" x2="60" y2="8" stroke="#27272a"/>
    <!-- items -->
    <rect x="0" y="16" width="12" height="12" rx="3" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="18" y="26" font-size="10" fill="#a1a1aa">LLM Agent (Claude)</text>
    <rect x="140" y="16" width="12" height="12" rx="3" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <text x="158" y="26" font-size="10" fill="#a1a1aa">Local / Python tool</text>
    <rect x="280" y="16" width="12" height="12" rx="3" fill="none" stroke="#71717a" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="298" y="26" font-size="10" fill="#a1a1aa">Conditional / skippable</text>
    <line x1="440" y1="22" x2="470" y2="22" stroke="#6366f1" stroke-width="1.8" marker-end="url(#a)"/>
    <text x="476" y="26" font-size="10" fill="#a1a1aa">Data / control flow</text>
    <line x1="600" y1="22" x2="630" y2="22" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ag)"/>
    <text x="636" y="26" font-size="10" fill="#a1a1aa">SSE / async result</text>
  </g>

  <!-- ── SYSTEM TYPE BADGE ── -->
  <g transform="translate(820,592)">
    <rect x="0" y="0" width="200" height="48" rx="10" fill="#1e1b4b" stroke="#818cf8" stroke-width="1"/>
    <text x="100" y="20" font-size="11" font-weight="700" fill="#c7d2fe" text-anchor="middle">Multi-Agent System</text>
    <text x="100" y="36" font-size="9" fill="#818cf8" text-anchor="middle">ReAct + Reflexion pattern</text>
  </g>

</svg>
